# NoteForge — Development Override
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
name: noteforge

services:
  # === note-service (dev) ===
  note-service:
    image: eclipse-temurin:21-jdk-alpine
    container_name: noteforge-note-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/noteforge
      SPRING_DATASOURCE_USERNAME: noteforge
      SPRING_DATASOURCE_PASSWORD: noteforge123
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: noteforge
      MINIO_SECRET_KEY: noteforge123
      NOTE_JWT_SECRET: ${NOTE_JWT_SECRET:-${JWT_SECRET:-noteforge-shared-jwt-secret-key-2026}}
      JWT_ACCESS_TOKEN_EXPIRATION: 3600000
      JWT_REFRESH_TOKEN_EXPIRATION: 604800000
    ports:
      - "8081:8081"
    volumes:
      - ../backend:/app
    working_dir: /app
    command: >
      sh -c "cd note-service && ../gradlew bootRun -x test"
    networks:
      - noteforge-net

  # === user-service (dev) ===
  user-service:
    image: eclipse-temurin:21-jdk-alpine
    container_name: noteforge-user-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/noteforge
      SPRING_DATASOURCE_USERNAME: noteforge
      SPRING_DATASOURCE_PASSWORD: noteforge123
      USER_JWT_SECRET: ${USER_JWT_SECRET:-${JWT_SECRET:-noteforge-shared-jwt-secret-key-2026}}
      JWT_ACCESS_TOKEN_EXPIRATION: 3600000
      JWT_REFRESH_TOKEN_EXPIRATION: 604800000
    ports:
      - "8082:8082"
    volumes:
      - ../backend:/app
    working_dir: /app
    command: >
      sh -c "cd user-service && ../gradlew bootRun -x test"
    networks:
      - noteforge-net

  # === ai-service (dev) ===
  ai-service:
    image: eclipse-temurin:21-jdk-alpine
    container_name: noteforge-ai-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/noteforge
      SPRING_DATASOURCE_USERNAME: noteforge
      SPRING_DATASOURCE_PASSWORD: noteforge123
      AI_JWT_SECRET: ${AI_JWT_SECRET:-${JWT_SECRET:-noteforge-shared-jwt-secret-key-2026}}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
    ports:
      - "8083:8083"
    volumes:
      - ../backend:/app
    working_dir: /app
    command: >
      sh -c "cd ai-service && ../gradlew bootRun -x test"
    networks:
      - noteforge-net

  # === Gateway (API Gateway) (dev) ===
  gateway:
    image: eclipse-temurin:21-jdk-alpine
    container_name: noteforge-gateway
    depends_on:
      - note-service
      - user-service
      - ai-service
    environment:
      JWT_SECRET: ${JWT_SECRET:-noteforge-shared-jwt-secret-key-2026}
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
    working_dir: /app
    command: >
      sh -c "cd gateway && ../gradlew bootRun -x test"
    networks:
      - noteforge-net

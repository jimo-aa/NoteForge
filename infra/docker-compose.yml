name: noteforge

services:
  # === PostgreSQL + pgvector ===
  postgres:
    image: pgvector/pgvector:pg16
    container_name: noteforge-postgres
    environment:
      POSTGRES_DB: noteforge
      POSTGRES_USER: noteforge
      POSTGRES_PASSWORD: noteforge123
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noteforge"]
      interval: 5s
      retries: 5
    networks:
      - noteforge-net

  # === Redis ===
  redis:
    image: redis:7-alpine
    container_name: noteforge-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - noteforge-net

  # === Elasticsearch ===
  elasticsearch:
    image: elasticsearch:8.12.0
    container_name: noteforge-es
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: -Xms512m -Xmx512m
      xpack.security.enabled: "false"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    networks:
      - noteforge-net

  # === MinIO ===
  minio:
    image: minio/minio
    container_name: noteforge-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: noteforge
      MINIO_ROOT_PASSWORD: noteforge123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    networks:
      - noteforge-net

  # === Nginx ===
  nginx:
    image: nginx:alpine
    container_name: noteforge-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    restart: unless-stopped
    networks:
      - noteforge-net

  # === Prometheus ===
  prometheus:
    image: prom/prometheus:latest
    container_name: noteforge-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - promdata:/prometheus
    networks:
      - noteforge-net

  # === Grafana ===
  grafana:
    image: grafana/grafana:latest
    container_name: noteforge-grafana
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - grafanadata:/var/lib/grafana
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
    networks:
      - noteforge-net

networks:
  noteforge-net:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  esdata:
  miniodata:
  promdata:
  grafanadata:

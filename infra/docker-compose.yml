version: '3.8'
name: noteforge

services:
  # === PostgreSQL + pgvector ===
  postgres:
    image: pgvector/pgvector:pg16
    container_name: noteforge-postgres
    environment:
      POSTGRES_DB: noteforge
      POSTGRES_USER: noteforge
      POSTGRES_PASSWORD: noteforge123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noteforge"]
      interval: 5s
      retries: 5
    networks:
      - noteforge-net

  # === Redis ===
  redis:
    image: redis:7-alpine
    container_name: noteforge-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - noteforge-net

  # === MinIO (对象存储) ===
  minio:
    image: minio/minio
    container_name: noteforge-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: noteforge
      MINIO_ROOT_PASSWORD: noteforge123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    networks:
      - noteforge-net

  # === note-service ===
  note-service:
    image: eclipse-temurin:21-jdk-alpine
    container_name: noteforge-note-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_URL: jdbc:postgresql://postgres:5432/noteforge
      DB_USER: noteforge
      DB_PASS: noteforge123
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: noteforge
      MINIO_SECRET_KEY: noteforge123
      JWT_SECRET: noteforge-mvp-dev-jwt-secret-key-2026
    ports:
      - "8081:8081"
    volumes:
      - ../backend:/app
    working_dir: /app
    command: >
      sh -c "cd note-service && ../gradlew bootRun -x test"
    networks:
      - noteforge-net

  # === user-service ===
  user-service:
    image: eclipse-temurin:21-jdk-alpine
    container_name: noteforge-user-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_URL: jdbc:postgresql://postgres:5432/noteforge
      DB_USER: noteforge
      DB_PASS: noteforge123
      JWT_SECRET: noteforge-mvp-dev-jwt-secret-key-2026
    ports:
      - "8082:8082"
    volumes:
      - ../backend:/app
    working_dir: /app
    command: >
      sh -c "cd user-service && ../gradlew bootRun -x test"
    networks:
      - noteforge-net

  # === Nginx ===
  nginx:
    image: nginx:alpine
    container_name: noteforge-nginx
    depends_on:
      - note-service
      - user-service
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - noteforge-net

networks:
  noteforge-net:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  miniodata:

version: '3.8'
name: noteforge

services:
  # === PostgreSQL + pgvector ===
  postgres:
    image: pgvector/pgvector:pg16
    container_name: noteforge-postgres
    environment:
      POSTGRES_DB: noteforge
      POSTGRES_USER: noteforge
      POSTGRES_PASSWORD: noteforge123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noteforge"]
      interval: 5s
      retries: 5
    networks:
      - noteforge-net

  # === Redis ===
  redis:
    image: redis:7-alpine
    container_name: noteforge-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - noteforge-net

  # === Elasticsearch (可选 — 全文搜索升级) ===
  elasticsearch:
    image: elasticsearch:8.12.0
    container_name: noteforge-es
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: -Xms512m -Xmx512m
      xpack.security.enabled: "false"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    networks:
      - noteforge-net

  # === MinIO (对象存储) ===
  minio:
    image: minio/minio
    container_name: noteforge-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: noteforge
      MINIO_ROOT_PASSWORD: noteforge123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    networks:
      - noteforge-net

  # === note-service ===
  note-service:
    image: eclipse-temurin:21-jdk-alpine
    container_name: noteforge-note-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/noteforge
      SPRING_DATASOURCE_USERNAME: noteforge
      SPRING_DATASOURCE_PASSWORD: noteforge123
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: noteforge
      MINIO_SECRET_KEY: noteforge123
      NOTE_JWT_SECRET: ${NOTE_JWT_SECRET:-${JWT_SECRET:-noteforge-shared-jwt-secret-key-2026}}
      JWT_ACCESS_TOKEN_EXPIRATION: 3600000
      JWT_REFRESH_TOKEN_EXPIRATION: 604800000
    ports:
      - "8081:8081"
    volumes:
      - ../backend:/app
    working_dir: /app
    command: >
      sh -c "cd note-service && ../gradlew bootRun -x test"
    networks:
      - noteforge-net

  # === user-service ===
  user-service:
    image: eclipse-temurin:21-jdk-alpine
    container_name: noteforge-user-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/noteforge
      SPRING_DATASOURCE_USERNAME: noteforge
      SPRING_DATASOURCE_PASSWORD: noteforge123
      USER_JWT_SECRET: ${USER_JWT_SECRET:-${JWT_SECRET:-noteforge-shared-jwt-secret-key-2026}}
      JWT_ACCESS_TOKEN_EXPIRATION: 3600000
      JWT_REFRESH_TOKEN_EXPIRATION: 604800000
    ports:
      - "8082:8082"
    volumes:
      - ../backend:/app
    working_dir: /app
    command: >
      sh -c "cd user-service && ../gradlew bootRun -x test"
    networks:
      - noteforge-net

  # === ai-service ===
  ai-service:
    image: eclipse-temurin:21-jdk-alpine
    container_name: noteforge-ai-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/noteforge
      SPRING_DATASOURCE_USERNAME: noteforge
      SPRING_DATASOURCE_PASSWORD: noteforge123
      AI_JWT_SECRET: ${AI_JWT_SECRET:-${JWT_SECRET:-noteforge-shared-jwt-secret-key-2026}}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
    ports:
      - "8083:8083"
    volumes:
      - ../backend:/app
    working_dir: /app
    command: >
      sh -c "cd ai-service && ../gradlew bootRun -x test"
    networks:
      - noteforge-net

  # === Nginx ===
  nginx:
    image: nginx:alpine
    container_name: noteforge-nginx
    depends_on:
      - note-service
      - user-service
      - ai-service
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - noteforge-net

  # === Prometheus ===
  prometheus:
    image: prom/prometheus:latest
    container_name: noteforge-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - promdata:/prometheus
    networks:
      - noteforge-net

  # === Grafana ===
  grafana:
    image: grafana/grafana:latest
    container_name: noteforge-grafana
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - grafanadata:/var/lib/grafana
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
    networks:
      - noteforge-net

networks:
  noteforge-net:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  esdata:
  miniodata:
  promdata:
  grafanadata:

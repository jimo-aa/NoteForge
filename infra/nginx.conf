# NoteForge — Nginx Reverse Proxy
# Uses resolver to dynamically resolve upstreams at request time,
# so Nginx starts even when backend services are not yet available.
# Docker DNS resolver is at 127.0.0.11.

resolver 127.0.0.11 valid=10s;

server {
    listen 80;
    server_name api.noteforge.local;

    client_max_body_size 50m;

    # ── note-service (port 8081) ──

    location /api/v1/notes {
        set $note_upstream "http://note-service:8081";
        proxy_pass $note_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/notebooks {
        set $note_upstream "http://note-service:8081";
        proxy_pass $note_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/v1/tags {
        set $note_upstream "http://note-service:8081";
        proxy_pass $note_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/v1/attachments {
        set $note_upstream "http://note-service:8081";
        proxy_pass $note_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 50m;
    }

    location /api/v1/sync {
        set $note_upstream "http://note-service:8081";
        proxy_pass $note_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/v1/search {
        set $note_upstream "http://note-service:8081";
        proxy_pass $note_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/v1/audit {
        set $note_upstream "http://note-service:8081";
        proxy_pass $note_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /ws/sync {
        set $note_upstream "http://note-service:8081";
        proxy_pass $note_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /swagger-ui.html {
        set $note_upstream "http://note-service:8081";
        proxy_pass $note_upstream;
        proxy_set_header Host $host;
    }

    # ── user-service (port 8082) ──

    location /api/v1/auth {
        set $user_upstream "http://user-service:8082";
        proxy_pass $user_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/v1/users {
        set $user_upstream "http://user-service:8082";
        proxy_pass $user_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── ai-service (port 8083) ──

    location /api/v1/ai {
        set $ai_upstream "http://ai-service:8083";
        proxy_pass $ai_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;  # SSE streaming needs longer timeout
    }
}

name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: '20'
  JAVA_VERSION: '21'

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            core/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('core/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Install frontend dependencies
        run: npm ci
        working-directory: desktop

      - name: TypeScript check & Vite build
        run: npm run build
        working-directory: desktop

      - name: Frontend tests
        run: npm test
        working-directory: desktop

      - name: Rust clippy
        run: cargo clippy -- -D warnings
        working-directory: core

      - name: Rust tests
        run: cargo test
        working-directory: core

      - name: Backend build & tests
        run: ./gradlew build
        working-directory: backend

  tauri-build:
    name: Tauri Build (MSI)
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || contains(github.event.pull_request.labels.*.name, 'build')
    needs: [quality]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop/src-tauri/target
          key: ${{ runner.os }}-tauri-${{ hashFiles('desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-tauri-

      - name: Install Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential curl wget file \
            libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install frontend dependencies
        run: npm ci
        working-directory: desktop

      - name: Build Tauri app
        run: npm run tauri build -- --bundles msi
        working-directory: desktop

      - name: Upload Tauri artifact
        uses: actions/upload-artifact@v4
        with:
          name: noteforge-msi
          path: desktop/src-tauri/target/release/bundle/msi/*.msi
          retention-days: 7

  docker:
    name: Docker Image Build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [quality]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build note-service image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/note-service/Dockerfile
          tags: noteforge/note-service:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build user-service image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/user-service/Dockerfile
          tags: noteforge/user-service:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

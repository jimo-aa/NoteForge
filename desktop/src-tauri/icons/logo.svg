<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="fg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Book/note body - two pages -->
  <g transform="translate(120, 100)">
    <!-- Left page -->
    <path d="M20,20 L150,20 L150,300 Q85,280 20,300 Z" fill="rgba(255,255,255,0.85)" stroke="#fff" stroke-width="2"/>
    <!-- Right page -->
    <path d="M152,20 L282,20 L282,300 Q217,280 152,300 Z" fill="rgba(255,255,255,0.7)" stroke="#fff" stroke-width="2"/>
    <!-- N letter -->
    <text x="72" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="160" font-weight="700" fill="url(#fg)" text-anchor="middle" dominant-baseline="middle">N</text>
    <!-- Forge spark - small flame accent -->
    <g transform="translate(220, 40)">
      <path d="M0,0 C5,-15 15,-20 12,-5 C18,-12 28,-15 24,0 C30,-8 38,-8 34,5 C28,18 10,20 4,8 Z" fill="rgba(251,191,36,0.9)"/>
    </g>
  </g>
</svg>

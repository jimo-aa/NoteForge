server:
  port: 8081
  shutdown: graceful

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:1420,tauri://localhost}

noteforge:
  rate-limit:
    enabled: true

spring:
  application:
    name: note-service
  profiles:
    active: dev
  jpa:
    properties:
      hibernate:
        format_sql: true
  cache:
    type: none
  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: ${JWT_SECRET:noteforge-mvp-dev-jwt-secret-key-2026}
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:3600000}
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:604800000}

minio:
  endpoint: ""
  access-key: ""
  secret-key: ""
  bucket: noteforge-attachments

# SpringDoc OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.noteforge: DEBUG

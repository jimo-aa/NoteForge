server:
  port: 8081

spring:
  application:
    name: note-service
  datasource:
    url: jdbc:postgresql://localhost:5432/noteforge
    username: noteforge
    password: noteforge123
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  cache:
    type: none
  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: noteforge-mvp-dev-jwt-secret-key-2026

minio:
  endpoint: ""
  access-key: ""
  secret-key: ""
  bucket: noteforge-attachments

logging:
  level:
    com.noteforge: DEBUG

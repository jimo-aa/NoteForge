server:
  port: 8083
  shutdown: graceful

spring:
  application:
    name: ai-service
  lifecycle:
    timeout-per-shutdown-phase: 30s
  jpa:
    properties:
      hibernate:
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

# AI model configuration
ai:
  provider: ${AI_PROVIDER:openai}
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:gpt-4o-mini}
    endpoint: ${OPENAI_ENDPOINT:https://api.openai.com/v1}
    max-tokens: ${OPENAI_MAX_TOKENS:2048}
    temperature: ${OPENAI_TEMPERATURE:0.7}
  claude:
    api-key: ${CLAUDE_API_KEY:}
    model: ${CLAUDE_MODEL:claude-3-haiku-20240307}
    endpoint: ${CLAUDE_ENDPOINT:https://api.anthropic.com/v1}
    max-tokens: ${CLAUDE_MAX_TOKENS:2048}
  embedding:
    model: ${EMBEDDING_MODEL:text-embedding-3-small}
    dimension: ${EMBEDDING_DIMENSION:1536}
  rate-limit:
    tokens-per-minute: ${AI_RATE_LIMIT_TPM:100000}
    requests-per-minute: ${AI_RATE_LIMIT_RPM:60}

# JWT — shared secret for auth validation
jwt:
  secret: ${AI_JWT_SECRET:${JWT_SECRET:noteforge-shared-jwt-secret-key-2026}}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.noteforge: DEBUG

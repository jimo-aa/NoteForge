server:
  port: 8000

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # User service
        - id: user-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - StripPrefix=0

        # Note service
        - id: note-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/notes/**, /api/v1/notebooks/**, /api/v1/tags/**, /api/v1/sync/**, /api/v1/attachments/**
          filters:
            - StripPrefix=0
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 100
                redis-rate-limiter.burstCapacity: 200

        # AI service
        - id: ai-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/ai/**
          filters:
            - StripPrefix=0
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40

      default-filters:
        - name: Retry
          args:
            retries: 3
            statuses: BAD_GATEWAY, SERVICE_UNAVAILABLE

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

logging:
  level:
    com.noteforge: DEBUG
    org.springframework.cloud.gateway: INFO

server:
  port: 8000

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # User service — auth endpoints (no JWT required for login/register)
        - id: user-service-auth
          uri: ${USER_SERVICE_URI:http://user-service:8082}
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - StripPrefix=0

        # User service — user management (JWT required)
        - id: user-service-users
          uri: ${USER_SERVICE_URI:http://user-service:8082}
          predicates:
            - Path=/api/v1/users/**
          filters:
            - StripPrefix=0

        # Note service — core business APIs
        - id: note-service
          uri: ${NOTE_SERVICE_URI:http://note-service:8081}
          predicates:
            - Path=/api/v1/notes/**, /api/v1/notebooks/**, /api/v1/tags/**, /api/v1/sync/**, /api/v1/attachments/**
          filters:
            - StripPrefix=0

        # Note service — search (global + fuzzy)
        - id: note-service-search
          uri: ${NOTE_SERVICE_URI:http://note-service:8081}
          predicates:
            - Path=/api/v1/search/**
          filters:
            - StripPrefix=0

        # Note service — audit
        - id: note-service-audit
          uri: ${NOTE_SERVICE_URI:http://note-service:8081}
          predicates:
            - Path=/api/v1/audit/**
          filters:
            - StripPrefix=0

        # AI service
        - id: ai-service
          uri: ${AI_SERVICE_URI:http://ai-service:8083}
          predicates:
            - Path=/api/v1/ai/**
          filters:
            - StripPrefix=0

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: '*'
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders: '*'
            allowCredentials: true
            maxAge: 3600

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST
        - name: Retry
          args:
            retries: 3
            statuses: BAD_GATEWAY, SERVICE_UNAVAILABLE

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

logging:
  level:
    com.noteforge: DEBUG
    org.springframework.cloud.gateway: INFO

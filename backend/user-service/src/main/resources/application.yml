server:
  port: 8082
  shutdown: graceful

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s

spring:
  application:
    name: user-service
  profiles:
    active: dev
  jpa:
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: ${JWT_SECRET:noteforge-mvp-dev-jwt-secret-key-2026}
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:900000}
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:604800000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.noteforge: DEBUG
    org.springframework.security: DEBUG

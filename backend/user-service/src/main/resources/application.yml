server:
  port: 8082
  shutdown: graceful

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:1420,tauri://localhost}

noteforge:
  rate-limit:
    enabled: true

spring:
  application:
    name: user-service
  profiles:
    active: dev
  jpa:
    properties:
      hibernate:
        format_sql: true

jwt:
  # user-service is the token issuer (signing authority).
  # Configure via USER_JWT_SECRET env var (or JWT_SECRET as fallback).
  secret: ${USER_JWT_SECRET:${JWT_SECRET:noteforge-shared-jwt-secret-key-2026}}
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:900000}
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:604800000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.noteforge: DEBUG
    org.springframework.security: DEBUG
